<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokédex Search</title>
<body>

    <h1>Pokédex Search</h1>

    <div class="search-container">
        <label for="pokemonName">Enter Pokémon Name:</label>
        <input type="text" id="pokemonName" placeholder="e.g., pikachu or mr-mime">
        
        <button id="searchBtn">Search</button>

        <p id="errorMessage"></p>

        <img id="pokemonSprite" src="" alt="Pokemon Sprite" style="display: none; margin-top: 20px;">
    </div>

    <script src="script.js"></script>
</body>
</html>
